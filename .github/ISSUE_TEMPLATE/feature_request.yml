name: Feature request
description: Suggest an idea for this project
labels: ['enhancement']
title: '[FR] '
body:
  - type: markdown
    attributes:
      value: |
        Before submitting this request, please search existing issues and make sure it's unique.
  - type: input
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what your suggestion is
    validations:
      required: true
  - type: textarea
    id: prob
    attributes:
      label: The problem
      description: Please describe the problem you are solving or new feature you're suggesting
      placeholder: I'm always frustrated when [...] happens
    validations:
      required: true
  - type: textarea
    id: sol
    attributes:
      label: Possible solutions
      description: Please describe possible solution(-s) to your problem
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the feature request here
