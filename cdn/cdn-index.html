<!doctype html>
<!--
  modernGraphTool — CDN Deployment Template

  This thin index.html loads the core application from a CDN while keeping
  your config, theme, and data files local on your server.

  Setup:
  1. Place this file as index.html on your web server
  2. Keep your config.js, theme.css, data/, and assets/ folders alongside it
  3. The app will auto-update when new versions are released

  To pin a specific major version, add CDN_MODE to your config.js:
    CDN_MODE: {
      MAJOR_VERSION: 1,
    },

  Local testing: serve this folder with any static server and visit the
  file by its literal name (e.g. http://localhost:3000/cdn-index.html).
  The loader auto-normalizes the URL so SvelteKit's router resolves to
  the root route. When running on localhost/127.0.0.1, the inline script
  below loads ./loader.js alongside this file (so you can iterate on
  loader changes without publishing). On any other hostname it pulls
  loader.js from the jsDelivr CDN.
-->
<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>modernGraphTool</title>
    <meta name="title" content="modernGraphTool" />
    <meta property="og:title" content="modernGraphTool" />
    <meta name="description" content="View and compare frequency response graphs for earphones/headphones."/>
    <meta property="og:description" content="View and compare frequency response graphs for earphones/headphones."/>
    <meta property="og:url" content="">
    <link rel="canonical" href="">
    <link rel="icon" type="image/png" href="./assets/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="shortcut icon" href="./assets/favicon.ico" />
    <meta property="og:type" content="website">
    <meta name="keywords" content="earphone,headphone,IEM,frequency response,graph,comparison,measurement,FR"/>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="mobileGraphTool" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/site.webmanifest" />

		<!-- Pretendard Variable font (Korean-optimized, dynamic subset) -->
		<link
			rel="stylesheet"
			as="style"
			crossorigin
			href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
		/>
		<!-- Local config and theme (your customizations) -->
		<script src="./config.js"></script>
		<link rel="stylesheet" href="./theme.css" />
	</head>

	<body data-sveltekit-preload-data="hover">
		<div id="app" style="display: contents"></div>
		<!-- modernGraphTool CDN loader — bootstraps the app from CDN -->
		<script>
			(function () {
				var h = location.hostname;
				var isLocal = h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0' || h === '::1';
				var src = isLocal
					? './loader.js'
					: 'https://cdn.jsdelivr.net/gh/potatosalad775/modernGraphTool@cdn/loader.js';
				var s = document.createElement('script');
				s.src = src;
				document.body.appendChild(s);
			})();
		</script>
	</body>
</html>
