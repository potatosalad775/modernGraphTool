<!doctype html>
<!--
  modernGraphTool — CDN Deployment Template

  This thin index.html loads the core application from a CDN while keeping
  your config, theme, and data files local on your server.

  Setup:
  1. Place this file as index.html on your web server
  2. Keep your config.js, theme.css, data/, and assets/ folders alongside it
  3. The app will auto-update when new versions are released

  To pin a specific major version, add CDN_MODE to your config.js:
    CDN_MODE: {
      MAJOR_VERSION: 1,
    },
-->
<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Pretendard Variable font (Korean-optimized, dynamic subset) -->
		<link
			rel="stylesheet"
			as="style"
			crossorigin
			href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
		/>
		<!-- Local config and theme (your customizations) -->
		<script src="/config.js"></script>
		<link rel="stylesheet" href="/theme.css" />
	</head>

	<body data-sveltekit-preload-data="hover">
		<div id="app" style="display: contents"></div>
		<!-- modernGraphTool CDN loader — bootstraps the app from CDN -->
		<script src="https://cdn.jsdelivr.net/gh/potatosalad775/modernGraphTool@cdn/loader.js"></script>
	</body>
</html>
