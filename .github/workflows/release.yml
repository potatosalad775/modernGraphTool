name: Release

# Builds both full and CDN distributions, creates a GitHub Release with
# both zips attached, and publishes CDN assets to the cdn branch for jsDelivr.

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (defaults to package.json version)'
        required: false
        type: string
      release_notes:
        description: 'Additional release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (major: $MAJOR)"

      # ── Build full dist/ ──────────────────────────────────────────────
      - name: Build full distribution
        run: npm run build

      - name: Package full distribution
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-packages
          cd dist
          zip -r "../release-packages/modernGraphTool_v${VERSION}_full.zip" .
          cd ..
          echo "Full dist size:"
          du -sh dist/

      # ── Build CDN dist/ ──────────────────────────────────────────────
      - name: Build CDN distribution
        run: node scripts/build-cdn.js
        env:
          MGT_CDN_BASE: https://cdn.jsdelivr.net/gh/${{ github.repository }}@cdn/v${{ steps.version.outputs.version }}

      - name: Package CDN distribution
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # The CDN user package contains everything EXCEPT _app/ and index.html
          # (they get the app from the CDN instead). We rename cdn-index.html → index.html.
          mkdir -p dist-cdn-package
          # Copy user-configurable files
          cp dist-cdn/config.js dist-cdn-package/
          cp dist-cdn/theme.css dist-cdn-package/
          cp dist-cdn/.htaccess dist-cdn-package/ 2>/dev/null || true
          cp -r dist-cdn/data dist-cdn-package/ 2>/dev/null || true
          cp -r dist-cdn/assets dist-cdn-package/ 2>/dev/null || true
          # Use the thin CDN index.html
          cp dist-cdn/cdn-index.html dist-cdn-package/index.html

          cd dist-cdn-package
          zip -r "../release-packages/modernGraphTool_v${VERSION}_cdn.zip" .
          cd ..
          echo "CDN package size:"
          du -sh dist-cdn-package/

      - name: Verify boot.json
        run: |
          echo "boot.json contents:"
          cat dist-cdn/boot.json
          echo ""
          echo "CDN bundle size:"
          du -sh dist-cdn/_app/

      # ── Deploy CDN assets to cdn branch ──────────────────────────────
      - name: Deploy to cdn branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR="${{ steps.version.outputs.major }}"

          # Save build artifacts to /tmp/ before switching branches
          mkdir -p /tmp/cdn-assets
          cp -r dist-cdn/_app "/tmp/cdn-assets/_app"
          cp dist-cdn/boot.json "/tmp/cdn-assets/boot.json"
          cp cdn/loader.js "/tmp/cdn-assets/loader.js"
          cp -r release-packages /tmp/release-packages

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create cdn branch
          git fetch origin cdn:cdn 2>/dev/null || true
          if git show-ref --verify --quiet refs/heads/cdn; then
            git checkout cdn
          else
            git checkout --orphan cdn
            git rm -rf . 2>/dev/null || true
          fi

          # Copy versioned assets
          mkdir -p "v${VERSION}"
          cp -r "/tmp/cdn-assets/_app" "v${VERSION}/_app"
          cp "/tmp/cdn-assets/boot.json" "v${VERSION}/boot.json"

          # Always update loader.js to latest
          cp "/tmp/cdn-assets/loader.js" loader.js

          # Update versions.json
          if [ -f versions.json ]; then
            node -e "
              const fs = require('fs');
              const v = JSON.parse(fs.readFileSync('versions.json', 'utf-8'));
              v['${MAJOR}'] = '${VERSION}';
              fs.writeFileSync('versions.json', JSON.stringify(v, null, 2));
            "
          else
            echo '{ "${MAJOR}": "${VERSION}" }' > versions.json
          fi

          echo "versions.json:"
          cat versions.json

          # Commit and push
          git add -A
          git commit -m "cdn: publish v${VERSION}" || echo "No changes to commit"
          git push origin cdn

      # ── Purge jsDelivr cache ─────────────────────────────────────────
      - name: Purge jsDelivr cache
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          echo "Purging jsDelivr cache..."
          curl -s "https://purge.jsdelivr.net/gh/${REPO}@cdn/versions.json" || true
          curl -s "https://purge.jsdelivr.net/gh/${REPO}@cdn/loader.js" || true
          curl -s "https://purge.jsdelivr.net/gh/${REPO}@cdn/v${VERSION}/boot.json" || true
          echo "Done."

      # ── Create GitHub Release ────────────────────────────────────────
      - name: Checkout back to source
        uses: actions/checkout@v4

      - name: Restore release packages
        run: |
          cp -r /tmp/release-packages release-packages
          echo "Restored packages:"
          ls -lh release-packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: modernGraphTool v${{ steps.version.outputs.version }}
          body: |
            ## Downloads

            | Package | Description |
            |---------|-------------|
            | `modernGraphTool_v${{ steps.version.outputs.version }}_full.zip` | **Full distribution** — drop entire contents on your web server |
            | `modernGraphTool_v${{ steps.version.outputs.version }}_cdn.zip` | **CDN distribution** — lightweight package, app loaded from CDN |

            ### Full distribution
            Extract and upload everything to your web server. Self-contained, no external dependencies.

            ### CDN distribution
            Lightweight package for auto-updating deployments. The core application is loaded from
            `cdn.jsdelivr.net` — you only host your config, theme, and data files.
            See [CDN deployment docs](https://potatosalad775.github.io/modernGraphTool/docs) for setup.

            ${{ github.event.inputs.release_notes && format('## Notes\n\n{0}', github.event.inputs.release_notes) || '' }}
          files: release-packages/*
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Summary ──────────────────────────────────────────────────────
      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          echo "Release complete!"
          echo ""
          echo "Version:       v${VERSION}"
          echo "Release:       https://github.com/${REPO}/releases/tag/v${VERSION}"
          echo "CDN loader:    https://cdn.jsdelivr.net/gh/${REPO}@cdn/loader.js"
          echo "CDN boot:      https://cdn.jsdelivr.net/gh/${REPO}@cdn/v${VERSION}/boot.json"
          echo ""
          echo "Packages:"
          ls -lh release-packages/
