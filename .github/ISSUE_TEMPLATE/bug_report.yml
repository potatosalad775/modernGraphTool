name: Bug Report
description: Report a bug building or running modernGraphTool
labels: ["bug"]
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Before submitting this bug report, please search existing issues and make sure it's unique.
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: The OS you are running modernGraphTool on
      options:
          - Windows
          - macOS
          - Linux
          - Android
          - iOS
          - Other
    validations:
        required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: The browser you are running modernGraphTool on
      options:
          - Chrome (Chromium)
          - Edge
          - Firefox
          - Safari
          - Other
    validations:
        required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Can be discovered at the bottom of the misc panel.
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to Reproduce?
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: A clear and concise description of what actually happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here. If applicable, add screenshots to help explain your problem.